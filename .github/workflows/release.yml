name: Release desktop app

# Every push to main bumps the version and builds/publishes Windows + macOS
# installers to a GitHub Release, with an auto-updater manifest attached.
# The app checks that manifest on launch (see src/components/UpdateChecker.tsx).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-version:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: bump
        run: |
          VERSION=$(node scripts/bump-version.mjs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust_target: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend deps
        run: npm ci

      # beforeBuildCommand in tauri.conf.json runs `next build` + the resource
      # staging script (stages the standalone app + downloads a matching Node
      # binary for THIS runner) before tauri-action compiles/bundles.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: greenlight-v${{ needs.bump-version.outputs.version }}
          releaseName: "Greenlight v${{ needs.bump-version.outputs.version }}"
          releaseBody: "Automatic build from the latest push to main."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
