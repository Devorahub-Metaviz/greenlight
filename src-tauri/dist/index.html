<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Greenlight</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: #0b0b0d; color: #e6e6e6;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    overflow: hidden; position: relative;
  }
  /* Soft drifting green cloud/smoke ambience behind the mark. */
  .cloud {
    position: absolute; border-radius: 50%; filter: blur(60px);
    background: radial-gradient(circle, rgba(34,197,94,0.35), transparent 70%);
    pointer-events: none;
  }
  .cloud.c1 { width: 420px; height: 420px; top: -120px; left: -100px; animation: drift1 16s ease-in-out infinite; }
  .cloud.c2 { width: 360px; height: 360px; bottom: -140px; right: -80px; animation: drift2 20s ease-in-out infinite; }
  .cloud.c3 { width: 300px; height: 300px; top: 40%; left: 60%; animation: drift3 24s ease-in-out infinite; background: radial-gradient(circle, rgba(21,128,61,0.30), transparent 70%); }
  @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,40px) scale(1.15); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,-30px) scale(1.1); } }
  @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-40px,50px) scale(0.9); } }
  .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .mark {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, #22c55e, #15803d);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(34,197,94,0.35);
  }
  .mark svg { width: 28px; height: 28px; }
  .label { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #9a9a9a; }
  .spin {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15); border-top-color: #22c55e;
    animation: sp 0.8s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  .err { max-width: 360px; text-align: center; font-size: 12.5px; line-height: 1.5; color: #f87171; display: none; }
  .retry {
    display: none; margin-top: 4px; padding: 7px 14px; border-radius: 8px; border: none;
    background: #22c55e; color: #0b0b0d; font-weight: 600; font-size: 12.5px; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 18.5 3c-.4 3.5-2 4.5-2 4.5s-2.5 1.5-4.5 3.5c-1.5 1.5-2 3-2 3s.5-1.5 3-2c1.75-.35 3.28-.9 4.5-2" />
      </svg>
    </div>
    <div class="spin" id="spinner"></div>
    <div class="label" id="label">Starting Greenlight…</div>
    <div class="err" id="err"></div>
    <button class="retry" id="retry" onclick="location.reload()">Retry</button>
  </div>
  <script>
    // Called from Rust (window.eval) if the bundled server never becomes ready,
    // so the splash doesn't spin forever with zero feedback.
    window.__greenlightStartupFailed = function (message) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("label").textContent = "Couldn't start Greenlight";
      var err = document.getElementById("err");
      err.textContent = message || "The background server didn't respond in time.";
      err.style.display = "block";
      document.getElementById("retry").style.display = "inline-block";
    };
  </script>
</body>
</html>
