<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Greenlight</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: #0b0b0d; color: #e6e6e6;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .mark {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, #22c55e, #15803d);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(34,197,94,0.35);
  }
  .mark svg { width: 28px; height: 28px; }
  .label { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #9a9a9a; }
  .spin {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15); border-top-color: #22c55e;
    animation: sp 0.8s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 18.5 3c-.4 3.5-2 4.5-2 4.5s-2.5 1.5-4.5 3.5c-1.5 1.5-2 3-2 3s.5-1.5 3-2c1.75-.35 3.28-.9 4.5-2" />
      </svg>
    </div>
    <div class="spin"></div>
    <div class="label">Starting Greenlight…</div>
  </div>
</body>
</html>
